name: Build GTA Mod DLL

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: Unique build id generated by Dify.
        required: true
        type: string
      assembly_name:
        description: Output assembly name, for example LiveStudioChaos.
        required: true
        type: string
      template_contract_version:
        description: Fixed LIVE Studio template contract expected by Dify.
        required: false
        default: live-studio-template-3
        type: string
      design_md_b64:
        description: UTF-8 DESIGN.md content encoded as base64.
        required: true
        type: string
      mod_cs_b64:
        description: UTF-8 ModProject/GeneratedGameplay.cs content encoded as base64.
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare fixed LIVE Studio template and generated gameplay
        id: prepare
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $buildId = "${{ inputs.build_id }}"
          if ($buildId -notmatch '^[A-Za-z0-9][A-Za-z0-9_-]{0,79}$') {
            throw "Invalid build_id. Use 1-80 letters, numbers, underscore, or hyphen, starting with a letter or number."
          }

          $assemblyName = "${{ inputs.assembly_name }}"
          $assemblyName = [System.IO.Path]::GetFileNameWithoutExtension($assemblyName)
          if ([string]::IsNullOrWhiteSpace($assemblyName)) {
            $assemblyName = "LiveStudioMod"
          }
          $assemblyName = ($assemblyName -replace '[^A-Za-z0-9._-]', '_')

          "BUILD_ID=$buildId" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SOURCE_FILE=GeneratedGameplay.cs" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSEMBLY_NAME=$assemblyName" | Out-File -FilePath $env:GITHUB_ENV -Append

          New-Item -ItemType Directory -Force -Path work, work/logs, work/live-studio, public/builds/$buildId | Out-Null
          Copy-Item -Path "templates/live-studio/*" -Destination "work/live-studio" -Recurse -Force

          $designBytes = [System.Convert]::FromBase64String("${{ inputs.design_md_b64 }}")
          $design = [System.Text.Encoding]::UTF8.GetString($designBytes)
          [System.IO.File]::WriteAllText("work/live-studio/DESIGN.md", $design, [System.Text.UTF8Encoding]::new($false))

          $gameplayBytes = [System.Convert]::FromBase64String("${{ inputs.mod_cs_b64 }}")
          $gameplay = [System.Text.Encoding]::UTF8.GetString($gameplayBytes)
          # Older Dify prompts could prepend a full-Mod protocol sentinel to otherwise valid
          # GeneratedGameplay.cs. The fixed template owns that protocol now, so discard only
          # this exact deprecated sentinel before enforcing the current gameplay boundary.
          $gameplay = [regex]::Replace(
            $gameplay,
            '(?im)^\s*#error\s+PROTOCOL_VALIDATION_FAILED:[^\r\n]*(?:\r?\n)?',
            '')
          $gameplay = [regex]::Replace($gameplay, '(?<![A-Za-z0-9_.])Screen\.ShowSubtitle', 'GTA.UI.Screen.ShowSubtitle')
          $gameplay = [regex]::Replace($gameplay, '(?<![A-Za-z0-9_.])Notification\.Show', 'GTA.UI.Notification.Show')
          $gameplay = $gameplay -replace 'GTA\.KeyEventArgs', 'KeyEventArgs'
          $gameplay = [regex]::Replace($gameplay, '\b(chat|chatEvent)\.(Message|Text)\b', '$1.Content')
          $gameplay = [regex]::Replace($gameplay, '(\.GiftId\s*(?:==|!=)\s*)(\d+)\b', '$1"$2"')
          if ($gameplay -match '\bVector3\b' -and $gameplay -notmatch 'using\s+GTA\.Math\s*;') {
            $gameplay = "using GTA.Math;`r`n$gameplay"
          }
          [System.IO.File]::WriteAllText(
            "work/live-studio/ModProject/GeneratedGameplay.cs",
            $gameplay,
            [System.Text.UTF8Encoding]::new($false))

          $contract = Get-Content -LiteralPath "work/live-studio/template-contract.json" -Raw | ConvertFrom-Json
          $templateVersion = [string]$contract.contract_version
          "TEMPLATE_VERSION=$templateVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          if ($templateVersion -ne "${{ inputs.template_contract_version }}") {
            throw "Template contract mismatch. Dify expects '${{ inputs.template_contract_version }}' but the repository provides '$templateVersion'."
          }

          [xml]$project = Get-Content -LiteralPath "work/live-studio/ModProject/ModProject.csproj"
          $project.Project.PropertyGroup.AssemblyName = $assemblyName
          $project.Save((Resolve-Path "work/live-studio/ModProject/ModProject.csproj"))

      - name: Validate generated gameplay boundary
        id: scope
        if: steps.prepare.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File "work/live-studio/scripts/validate-generated-gameplay.ps1" -Path "work/live-studio/ModProject/GeneratedGameplay.cs" *> work/logs/scope.log
          exit $LASTEXITCODE

      - name: Run LIVE Studio protocol fixtures
        id: contract
        if: steps.prepare.outcome == 'success' && steps.scope.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          dotnet run --project "work/live-studio/ContractTests/ContractTests.csproj" --configuration Release *> work/logs/contract.log
          exit $LASTEXITCODE

      - name: Restore and build
        id: compile
        if: steps.prepare.outcome == 'success' && steps.scope.outcome == 'success' && steps.contract.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File "work/live-studio/scripts/build-mod.ps1" *> work/logs/build.log
          exit $LASTEXITCODE

      - name: Prepare public result
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $buildId = $env:BUILD_ID
          $assemblyName = $env:ASSEMBLY_NAME
          $sourceFile = $env:SOURCE_FILE
          $templateVersion = $env:TEMPLATE_VERSION
          $buildDir = "public/builds/$buildId"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null

          Copy-Item -LiteralPath "pages/status.html" -Destination "public/status.html" -Force
          New-Item -ItemType File -Force -Path "public/.nojekyll" | Out-Null

          $logParts = @()
          foreach ($logFile in @("work/logs/scope.log", "work/logs/contract.log", "work/logs/build.log")) {
            if (Test-Path -LiteralPath $logFile) {
              $logParts += Get-Content -LiteralPath $logFile -Raw
            }
          }
          $log = $logParts -join "`r`n"
          if ($log.Length -gt 16000) {
            $log = $log.Substring($log.Length - 16000)
          }

          $prepareOutcome = "${{ steps.prepare.outcome }}"
          $scopeOutcome = "${{ steps.scope.outcome }}"
          $contractOutcome = "${{ steps.contract.outcome }}"
          $compileOutcome = "${{ steps.compile.outcome }}"
          $dllPath = "work/live-studio/dist/$assemblyName.dll"
          $designPath = "work/live-studio/DESIGN.md"
          $fixedModPath = "work/live-studio/ModProject/Mod.cs"
          $gameplayPath = "work/live-studio/ModProject/GeneratedGameplay.cs"
          $contractPath = "work/live-studio/template-contract.json"

          $design = if (Test-Path $designPath) { Get-Content -LiteralPath $designPath -Raw } else { "" }
          $gameplay = if (Test-Path $gameplayPath) { Get-Content -LiteralPath $gameplayPath -Raw } else { "" }

          $status = "failed"
          $downloadUrl = $null
          $repairable = $false
          if ($prepareOutcome -ne "success") {
            $stage = "template_contract"
            $message = "Template preparation or contract validation failed."
          }
          elseif ($scopeOutcome -ne "success") {
            $stage = "generated_scope"
            $message = "Generated gameplay crossed the fixed template boundary."
            $repairable = $true
          }
          elseif ($contractOutcome -ne "success") {
            $stage = "protocol_fixture"
            $message = "The fixed LIVE Studio protocol fixture test failed."
          }
          elseif ($compileOutcome -eq "success" -and (Test-Path $dllPath)) {
            $stage = "complete"
            $status = "success"
            $message = "Build and LIVE Studio contract tests succeeded."

            $readme = @"
          GTA5 LIVE Studio ScriptHookVDotNet Mod

          Install:
          1. Install ScriptHookV and ScriptHookVDotNet v3.
          2. Open TikTok LIVE Studio and make sure the local bridge is available at ws://127.0.0.1:60080.
          3. Copy $assemblyName.dll to your GTA V/scripts/ folder.
          4. Start GTA V Story Mode.

          Template contract: $templateVersion
          "@
            [System.IO.File]::WriteAllText("$buildDir/README.txt", $readme, [System.Text.UTF8Encoding]::new($false))
            Copy-Item -LiteralPath $dllPath -Destination "$buildDir/$assemblyName.dll" -Force
            Copy-Item -LiteralPath $designPath -Destination "$buildDir/DESIGN.md" -Force
            Copy-Item -LiteralPath $fixedModPath -Destination "$buildDir/Mod.cs" -Force
            Copy-Item -LiteralPath $gameplayPath -Destination "$buildDir/GeneratedGameplay.cs" -Force
            Copy-Item -LiteralPath $contractPath -Destination "$buildDir/template-contract.json" -Force
            $zipName = "$assemblyName.zip"
            Compress-Archive -Path "$buildDir/$assemblyName.dll", "$buildDir/DESIGN.md", "$buildDir/Mod.cs", "$buildDir/GeneratedGameplay.cs", "$buildDir/template-contract.json", "$buildDir/README.txt" -DestinationPath "$buildDir/$zipName" -Force
            $downloadUrl = "builds/$buildId/$zipName"
          }
          else {
            $stage = "compile"
            $message = "Generated gameplay failed to compile."
            $repairable = $true
          }

          $statusObj = [ordered]@{
            build_id = $buildId
            status = $status
            stage = $stage
            repairable = $repairable
            message = $message
            file_name = $sourceFile
            assembly_name = $assemblyName
            template_contract_version = $templateVersion
            download_url = $downloadUrl
            created_at = (Get-Date).ToUniversalTime().ToString("o")
            build_log = $log
            design_md = $design
            mod_cs = $gameplay
          }
          $statusObj | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath "$buildDir/status.json" -Encoding UTF8

      - name: Publish to gh-pages branch
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if (git ls-remote --exit-code --heads origin gh-pages) {
            git fetch origin gh-pages
            git branch gh-pages origin/gh-pages
            git worktree add pages-branch gh-pages
          }
          else {
            git worktree add --detach pages-branch
            git -C pages-branch checkout --orphan gh-pages
            Get-ChildItem -LiteralPath pages-branch -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force
          }

          Copy-Item -Path public/* -Destination pages-branch -Recurse -Force
          git -C pages-branch add -A
          $changes = git -C pages-branch status --porcelain
          if ($changes) {
            git -C pages-branch commit -m "Publish build $env:BUILD_ID"
            git -C pages-branch push origin gh-pages
          }
          else {
            Write-Host "No Pages changes to publish."
          }

      - name: Fail workflow when validation or compilation failed
        if: always() && (steps.prepare.outcome != 'success' || steps.scope.outcome != 'success' || steps.contract.outcome != 'success' || steps.compile.outcome != 'success')
        shell: pwsh
        run: |
          Write-Error "Build validation or compilation failed. status.json has been published."
