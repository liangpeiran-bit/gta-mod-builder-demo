name: Build GTA Mod DLL

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: Unique build id generated by Dify.
        required: true
        type: string
      file_name:
        description: Source file name, for example MyMod.cs.
        required: true
        type: string
      source_b64:
        description: UTF-8 C# source code encoded as base64.
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare source and project
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $buildId = "${{ inputs.build_id }}"
          if ($buildId -notmatch '^[A-Za-z0-9._-]{1,80}$') {
            throw "Invalid build_id. Use only letters, numbers, dot, underscore, and hyphen."
          }

          $fileName = "${{ inputs.file_name }}"
          $fileName = [System.IO.Path]::GetFileName($fileName)
          if ([string]::IsNullOrWhiteSpace($fileName) -or -not $fileName.EndsWith(".cs", [System.StringComparison]::OrdinalIgnoreCase)) {
            $fileName = "GeneratedMod.cs"
          }
          $fileName = ($fileName -replace '[^A-Za-z0-9._-]', '_')

          $assemblyName = [System.IO.Path]::GetFileNameWithoutExtension($fileName)
          if ([string]::IsNullOrWhiteSpace($assemblyName)) {
            $assemblyName = "GeneratedMod"
          }
          $assemblyName = ($assemblyName -replace '[^A-Za-z0-9._-]', '_')

          New-Item -ItemType Directory -Force -Path work/src, work/out, public/builds/$buildId | Out-Null

          $sourceBytes = [System.Convert]::FromBase64String("${{ inputs.source_b64 }}")
          $source = [System.Text.Encoding]::UTF8.GetString($sourceBytes)
          $source = [regex]::Replace($source, '(?<![A-Za-z0-9_.])Screen\.ShowSubtitle', 'GTA.UI.Screen.ShowSubtitle')
          $sourcePath = Join-Path "work/src" $fileName
          [System.IO.File]::WriteAllText($sourcePath, $source, [System.Text.UTF8Encoding]::new($false))

          $project = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net48</TargetFramework>
              <OutputType>Library</OutputType>
              <AssemblyName>$assemblyName</AssemblyName>
              <RootNamespace>$assemblyName</RootNamespace>
              <LangVersion>7.3</LangVersion>
              <Nullable>disable</Nullable>
              <ImplicitUsings>disable</ImplicitUsings>
              <EnableDefaultCompileItems>false</EnableDefaultCompileItems>
              <AppendTargetFrameworkToOutputPath>false</AppendTargetFrameworkToOutputPath>
              <OutputPath>..\out\</OutputPath>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include="$fileName" />
              <PackageReference Include="ScriptHookVDotNet3" Version="3.6.0" />
              <Reference Include="System.Windows.Forms" />
            </ItemGroup>
          </Project>
          "@
          [System.IO.File]::WriteAllText("work/src/GeneratedMod.csproj", $project, [System.Text.UTF8Encoding]::new($false))

          "BUILD_ID=$buildId" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SOURCE_FILE=$fileName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSEMBLY_NAME=$assemblyName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Restore and build
        id: compile
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path work/logs | Out-Null
          dotnet restore work/src/GeneratedMod.csproj *> work/logs/build.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          dotnet build work/src/GeneratedMod.csproj --configuration Release --no-restore *> work/logs/build.log
          exit $LASTEXITCODE

      - name: Prepare public result
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $buildId = $env:BUILD_ID
          $assemblyName = $env:ASSEMBLY_NAME
          $sourceFile = $env:SOURCE_FILE
          $buildDir = "public/builds/$buildId"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null

          Copy-Item -LiteralPath "pages/status.html" -Destination "public/status.html" -Force
          New-Item -ItemType File -Force -Path "public/.nojekyll" | Out-Null

          $log = ""
          if (Test-Path "work/logs/build.log") {
            $log = Get-Content -LiteralPath "work/logs/build.log" -Raw
          }
          if ($log.Length -gt 12000) {
            $log = $log.Substring($log.Length - 12000)
          }

          $compileOutcome = "${{ steps.compile.outcome }}"
          $dllPath = "work/out/$assemblyName.dll"
          if ($compileOutcome -eq "success" -and (Test-Path $dllPath)) {
            $readme = @"
          GTA5 ScriptHookVDotNet Mod

          Install:
          1. Install ScriptHookV and ScriptHookVDotNet v3.
          2. Copy $assemblyName.dll to your GTA V/scripts/ folder.
          3. Start GTA V Story Mode.

          This demo build is generated automatically. Review generated code before using mods from untrusted prompts.
          "@
            [System.IO.File]::WriteAllText("$buildDir/README.txt", $readme, [System.Text.UTF8Encoding]::new($false))
            Copy-Item -LiteralPath $dllPath -Destination "$buildDir/$assemblyName.dll" -Force
            Copy-Item -LiteralPath "work/src/$sourceFile" -Destination "$buildDir/$sourceFile" -Force
            $zipName = "$assemblyName.zip"
            Compress-Archive -Path "$buildDir/$assemblyName.dll", "$buildDir/$sourceFile", "$buildDir/README.txt" -DestinationPath "$buildDir/$zipName" -Force
            $status = "success"
            $downloadUrl = "builds/$buildId/$zipName"
            $message = "Build succeeded."
          }
          else {
            $status = "failed"
            $downloadUrl = $null
            $message = "Build failed. See build_log for details."
          }

          $statusObj = [ordered]@{
            build_id = $buildId
            status = $status
            message = $message
            file_name = $sourceFile
            assembly_name = $assemblyName
            download_url = $downloadUrl
            created_at = (Get-Date).ToUniversalTime().ToString("o")
            build_log = $log
          }
          $statusObj | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath "$buildDir/status.json" -Encoding UTF8

      - name: Publish to gh-pages branch
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if (git ls-remote --exit-code --heads origin gh-pages) {
            git fetch origin gh-pages
            git branch gh-pages origin/gh-pages
            git worktree add pages-branch gh-pages
          }
          else {
            git worktree add --detach pages-branch
            git -C pages-branch checkout --orphan gh-pages
            Get-ChildItem -LiteralPath pages-branch -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force
          }

          Copy-Item -Path public/* -Destination pages-branch -Recurse -Force
          git -C pages-branch add -A
          $changes = git -C pages-branch status --porcelain
          if ($changes) {
            git -C pages-branch commit -m "Publish build $env:BUILD_ID"
            git -C pages-branch push origin gh-pages
          }
          else {
            Write-Host "No Pages changes to publish."
          }

      - name: Fail workflow when compilation failed
        if: steps.compile.outcome != 'success'
        shell: pwsh
        run: |
          Write-Error "Compilation failed. status.json has been published."
